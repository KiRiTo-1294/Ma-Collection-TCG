<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Collection TCG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #191410;
    --bg-panel: #1D1712;
    --bg-input: #100C09;
    --border: #3A2E20;
    --border-soft: #2E2419;
    --text: #F5EDE3;
    --text-muted: #B8A88F;
    --text-faint: #8A7A63;
    --text-fainter: #6B5D48;
    --orange: #FF7A29;
    --gold: #FFC857;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }
  .display-font { font-family: 'Saira Condensed', system-ui, sans-serif; }

  .header {
    padding: 32px 20px 26px;
    background: linear-gradient(180deg, #1F1712 0%, #191410 100%);
    border-bottom: 1px solid var(--border-soft);
    text-align: center;
  }
  .eyebrow {
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-muted); font-weight: 600; margin-bottom: 6px;
  }
  h1 {
    font-size: clamp(30px, 8vw, 42px);
    font-weight: 800; margin: 0; color: var(--orange); line-height: 1;
  }
  .sub { font-size: 13.5px; color: var(--text-faint); margin-top: 10px; }

  .grid {
    max-width: 880px; margin: 0 auto; padding: 28px 20px 60px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }

  .tile {
    position: relative;
    border-radius: 12px;
    padding: 20px 14px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    min-height: 120px;
    text-decoration: none;
    border: 1px solid var(--border-soft);
  }
  .tile.active {
    background: linear-gradient(160deg, #2A1E12 0%, #1D1712 100%);
    border-color: var(--orange);
    cursor: pointer;
  }
  .tile.active:active { transform: scale(0.98); }
  .tile.soon {
    background: var(--bg-panel);
    opacity: 0.45;
    cursor: default;
  }
  .tile-name {
    font-family: 'Saira Condensed', system-ui, sans-serif;
    font-weight: 700; font-size: 16px; color: var(--text); line-height: 1.15;
  }
  .tile.active .tile-name { color: var(--orange); }
  .tile-badge {
    position: absolute; top: 8px; right: 8px;
    font-size: 9.5px; letter-spacing: 0.05em; text-transform: uppercase;
    background: var(--bg-input); color: var(--text-fainter);
    padding: 3px 7px; border-radius: 20px; border: 1px solid var(--border);
  }
  .tile.active .tile-badge {
    background: var(--orange); color: var(--bg); border: none; font-weight: 700;
  }
  .tile-icon { font-size: 30px; margin-bottom: 8px; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Ma collection</div>
  <h1 class="display-font">Choisis ton jeu</h1>
  <div class="sub">D'autres jeux arriveront au fil du temps</div>
</div>

<div class="grid">
  <a href="dragon-ball.html" class="tile active">
    <span class="tile-badge">Ouvrir</span>
    <div class="tile-icon">🐉</div>
    <div class="tile-name">Dragon Ball<br>TCG</div>
  </a>

  <div class="tile soon">
    <span class="tile-badge">Bientôt</span>
    <div class="tile-icon">🐾</div>
    <div class="tile-name">Pokémon</div>
  </div>

  <div class="tile soon">
    <span class="tile-badge">Bientôt</span>
    <div class="tile-icon">🔮</div>
    <div class="tile-name">Magic: The<br>Gathering</div>
  </div>

  <div class="tile soon">
    <span class="tile-badge">Bientôt</span>
    <div class="tile-icon">🃏</div>
    <div class="tile-name">Yu-Gi-Oh!</div>
  </div>

  <div class="tile soon">
    <span class="tile-badge">Bientôt</span>
    <div class="tile-icon">☠️</div>
    <div class="tile-name">One Piece</div>
  </div>

  <div class="tile soon">
    <span class="tile-badge">Bientôt</span>
    <div class="tile-icon">❄️</div>
    <div class="tile-name">Lorcana</div>
  </div>
</div>

</body>
</html>
